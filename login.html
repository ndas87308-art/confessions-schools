<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anonymous</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(to right,#090018,#00103b);
    color:white;
    min-height:100vh;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.logo{
    font-size:48px;
    font-weight:bold;
}

.user{
    font-size:22px;
    opacity:0.8;
}

.messages-container{
    width:100%;
    max-width:700px;
    height:420px;
    overflow-y:auto;
    margin:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.messages-container::-webkit-scrollbar{
    width:6px;
}

.messages-container::-webkit-scrollbar-thumb{
    background:#6c4dff;
    border-radius:20px;
}

.message-box{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    padding:20px;
    border-radius:24px;
    animation:fade 0.3s ease;
    word-wrap:break-word;
}

.message-box:hover{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(110,80,255,0.25);
}

.message-box h3{
    color:#63a7ff;
    font-size:28px;
    margin-bottom:6px;
}

.message-box span{
    color:#ff8fd8;
    font-size:15px;
    display:block;
    margin-bottom:12px;
}

.message-box p{
    font-size:18px;
    line-height:1.6;
}

.form-container{
    width:100%;
    max-width:850px;
    margin:30px auto 0;
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:30px;
    backdrop-filter:blur(15px);
}

.form-container input,
.form-container textarea{
    width:100%;
    background:rgba(255,255,255,0.08);
    border:none;
    outline:none;
    padding:18px 20px;
    border-radius:18px;
    color:white;
    font-size:17px;
    margin-bottom:16px;
}

.form-container textarea{
    min-height:140px;
    resize:none;
}

.form-container input::placeholder,
.form-container textarea::placeholder{
    color:rgba(255,255,255,0.5);
}

.form-container button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#7b3cff,#2f6dff);
    color:white;
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">Anonymous</div>
    <div class="user">Hi, nayanjyoti</div>
</div>

<div class="messages-container" id="messages">

    <div class="message-box">
        <h3>Mpa</h3>
        <span>@ghost</span>
        <p>Bro this UI lowkey fire 🔥</p>
    </div>

</div>

<div class="form-container">

    <input type="text" id="school" placeholder="Enter school name">

    <input type="text" id="name" placeholder="Enter your name (optional)">

    <textarea id="message" placeholder="Write anything anonymously..."></textarea>

    <button id="postBtn">Post Message</button>

</div>

<script>

const postBtn = document.getElementById("postBtn");
const messageInput = document.getElementById("message");
const nameInput = document.getElementById("name");
const messages = document.getElementById("messages");

const tags = [
    "@ghost",
    "@sigma",
    "@vibes",
    "@anon",
    "@npc",
    "@coolkid",
    "@lowkey",
    "@realone"
];

postBtn.addEventListener("click", function(){

    const messageText = messageInput.value.trim();
    const username = nameInput.value.trim() || "Anonymous";

    if(messageText === ""){
        alert("Write something first 😭");
        return;
    }

    const randomTag = tags[Math.floor(Math.random() * tags.length)];

    const newMessage = document.createElement("div");

    newMessage.classList.add("message-box");

    newMessage.innerHTML = `
        <h3>${username}</h3>
        <span>${randomTag}</span>
        <p>${messageText}</p>
    `;

    messages.prepend(newMessage);

    messageInput.value = "";
    nameInput.value = "";

});

</script>

</body>
</html>
