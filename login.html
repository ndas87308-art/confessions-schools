<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anonymous</title>

<style>

/* FIXED MESSAGE CONTAINER */
.messages-container{
    width:100%;
    max-width:650px;
    margin:120px auto 30px;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:18px;

    height:500px;
    overflow-y:auto;
    scroll-behavior:smooth;
    scrollbar-width:thin;
}

.messages-container::-webkit-scrollbar{
    width:6px;
}

.messages-container::-webkit-scrollbar-thumb{
    background:#6c4dff;
    border-radius:20px;
}

/* MESSAGE CARD */
.message-box{
    width:100%;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    padding:18px;
    border-radius:22px;
    word-wrap:break-word;
    transition:0.3s ease;
}

.message-box:hover{
    transform:translateY(-2px);
    border-color:rgba(120,90,255,0.5);
    box-shadow:0 0 20px rgba(100,80,255,0.2);
}

.message-box h3{
    color:#69a8ff;
    font-size:24px;
    margin-bottom:5px;
}

.message-box span{
    color:#ff8fd8;
    font-size:14px;
    display:block;
    margin-bottom:12px;
}

.message-box p{
    color:white;
    font-size:17px;
    line-height:1.6;
}

/* BODY */
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(to right,#090018,#00103b);
    color:white;
}

/* FORM */
.form-container{
    width:90%;
    max-width:850px;
    margin:20px auto;
    padding:25px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
}

.form-container input,
.form-container textarea{
    width:100%;
    border:none;
    outline:none;
    background:rgba(255,255,255,0.08);
    padding:18px 20px;
    border-radius:18px;
    color:white;
    font-size:16px;
    margin-bottom:16px;
}

.form-container textarea{
    min-height:140px;
    resize:none;
}

.form-container button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:18px;
    background:linear-gradient(90deg,#7b3cff,#2f6dff);
    color:white;
    font-size:28px;
    font-weight:700;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="messages-container">

    <div class="message-box">
        <h3>Mpa</h3>
        <span>@Nayan</span>
        <p>Bro this UI lowkey fire 🔥</p>
    </div>

    <div class="message-box">
        <h3>Anonymous</h3>
        <span>@ghost</span>
        <p>Ngl this page aesthetic af 😭</p>
    </div>

</div>

<div class="form-container">

    <input type="text" placeholder="Enter school name">

    <input type="text" placeholder="Enter your name">

    <textarea placeholder="Write anything anonymously..."></textarea>

    <button>Post Message</button>

</div>

</body>
</html>
