<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Anonymous Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#0f0f1a;
}

.bg1,.bg2{
    position:fixed;
    border-radius:50%;
    filter:blur(120px);
    z-index:-1;
}

.bg1{
    width:350px;
    height:350px;
    background:#7c3aed;
    top:-100px;
    left:-100px;
}

.bg2{
    width:350px;
    height:350px;
    background:#2563eb;
    bottom:-100px;
    right:-100px;
}

.login-box{
    width:360px;
    padding:35px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.title{
    color:white;
    text-align:center;
    font-size:34px;
    font-weight:700;
    margin-bottom:10px;
}

.sub{
    color:#cbd5e1;
    text-align:center;
    margin-bottom:25px;
    font-size:14px;
}

input{
    width:100%;
    height:55px;
    border:none;
    outline:none;
    margin-bottom:15px;
    border-radius:16px;
    padding:0 18px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:15px;
}

input::placeholder{
    color:#cbd5e1;
}

button{
    width:100%;
    height:55px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#7c3aed,#2563eb);
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
}

.note{
    color:#9ca3af;
    font-size:12px;
    margin-top:15px;
    text-align:center;
}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="login-box">

    <div class="title">
        Anonymous
    </div>

    <div class="sub">
        Share thoughts freely ✨
    </div>

    <input
    type="text"
    id="name"
    placeholder="Enter your name">

    <input
    type="number"
    id="age"
    placeholder="Enter your age">

    <button onclick="enterSite()">
        Enter
    </button>

    <div class="note">
        Name is optional • Age helps community safety
    </div>

</div>

<script>

function enterSite(){

    let name =
    document.getElementById("name").value.trim();

    let age =
    document.getElementById("age").value.trim();

    if(age === ""){
        alert("Please enter age");
        return;
    }

    localStorage.setItem(
    "anonymous_name",
    name || "Anonymous"
    );

    localStorage.setItem(
    "anonymous_age",
    age
    );

    window.location.href = "login.html";
}

</script>

</body>
</html>
